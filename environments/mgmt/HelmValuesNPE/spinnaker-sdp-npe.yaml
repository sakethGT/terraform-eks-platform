halyard:
  additionalSecrets:
    create: true
    data:
      keystore.p12: <BASE64_ENCODED_KEYSTORE_PLACEHOLDER>
       # base64 encoded keystore in pkcs12 format
      password.txt: <BASE64_ENCODED_PASSWORD_PLACEHOLDER>
       # base64 encoded password for the keystore
      metadata.xml: <BASE64_ENCODED_METADATA_XML_PLACEHOLDER>
      # base64 encoded metadata.xml file from your SAML authenticator
      dev-npe-kubeconfig.yaml: <BASE64_ENCODED_KUBECONFIG_PLACEHOLDER>

  additionalProfileConfigMaps:
    create: true
    data:
      igor-local.yml: |-
        spinnaker:
          pollingSafeguard:
            itemUpperThreshold: 20000
  additionalConfigMaps:
    create: true
    data:
      config.src: |-
        KEYSTORE_ALIAS=saml # Alias in the keystore for the cert
        GATE_URL="https://spinnaker-gate.sdp.npe.example-internal.com" # URL to access your gate
        DECK_URL="https://spinnaker.sdp.npe.example-internal.com" # Url to access your deck
        ISSUER_ID="spinnaker.okta.test"

        # Put the keystore, metadata, and keystore password in these files under additioanlSecrets
        KEYSTORE_FILE=/opt/halyard/additionalSecrets/keystore.p12
        PASSWORD_FILE=/opt/halyard/additionalSecrets/password.txt
        METADATA_FILE=/opt/halyard/additionalSecrets/metadata.xml
      K8-Config.src: |-
        ACCOUNT_NAME="dev-npe"
        CONTEXT="spinnaker-slave-spinnaker-slave"
        SPINNAKER_NAMESPACE="spinnaker-slave"
        SPINNAKER_SERVICE_ACCOUNT_NAME="spinnaker-slave"
        KUBECONFIG_FULL=/opt/halyard/additionalSecrets/dev-npe-kubeconfig.yaml

  additionalScripts:
    create: true
    data:
      enable_s3_artifact.sh: |-
        $HAL_COMMAND config artifact s3 enable
        $HAL_COMMAND config artifact s3 account add platform --region us-east-1
        $HAL_COMMAND config provider docker-registry enable
        # $HAL_COMMAND config provider docker-registry account add ecr-npe --address https://123456789012.dkr.ecr.us-east-1.amazonaws.com --username AWS --password-command "aws --region us-east-1 ecr get-authorization-token --output text --query 'authorizationData[].authorizationToken' | base64 -d | sed 's/^AWS://'"

      configure_saml.sh: |
        # This source file contains these variables:
        # -> GATE_URL DECK_URL KEYSTORE_FILE PASSWORD_FILE METADATA_FILE KEYSTORE_ALIAS
        source /opt/halyard/additionalConfigMaps/config.src

        KEYSTORE_PASSWORD="$( cat "$PASSWORD_FILE" )"
        $HAL_COMMAND config security ui edit --override-base-url "$DECK_URL"
        $HAL_COMMAND config security api edit --override-base-url "$GATE_URL"
        $HAL_COMMAND config security authn saml edit \
          --keystore "$KEYSTORE_FILE" \
          --keystore-alias "$KEYSTORE_ALIAS" \
          --keystore-password "$KEYSTORE_PASSWORD" \
          --metadata "$METADATA_FILE" \
          --issuer-id "$ISSUER_ID" \
          --no-validate \
          --service-address-url "$GATE_URL"
        $HAL_COMMAND config security authn saml enable
        # $HAL_COMMAND config security authn saml disable

      K8_cluster.sh: |
        source /opt/halyard/additionalConfigMaps/K8-Config.src

        $HAL_COMMAND config provider kubernetes enable

        $HAL_COMMAND config provider kubernetes account edit "$ACCOUNT_NAME" --context "$CONTEXT" --kubeconfig-file "$KUBECONFIG_FULL"

  spinnakerVersion: 1.11.6
  image:
    tag: 1.16.0

ingress:
  enabled: true
  host: spinnaker.sdp.npe.example-internal.com
  annotations:
    kubernetes.io/ingress.class: nginx-int

ingressGate:
  enabled: true
  host: spinnaker-gate.sdp.npe.example-internal.com
  annotations:
    kubernetes.io/ingress.class: nginx-int

minio:
  enabled: false

s3:
  enabled: true
  bucket: my-spinnaker-bucket

slack:
  enabled: true
  token: <SLACK_BOT_TOKEN>
