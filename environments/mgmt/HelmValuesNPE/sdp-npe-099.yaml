# An example of ClusterConfig object using an existing VPC:
---
apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

######
# for testing only harcoded VPC and subnets - until we are done with Infra design work
######


metadata:
  name: NpeSdp099
  region: us-east-1

vpc:
  id: "vpc-01303c8b1358d0199"  # (optional, must match VPC ID used for each subnet below)
  #cidr: "192.168.0.0/16"       # (optional, must match CIDR used by the given VPC)
  subnets:
    # must provide 'private' and/or 'public' subnets by availibility zone as shown
    private:
      us-east-1a:
        id: "subnet-0b3584dbffeff897b"
        #cidr: "192.168.128.0/19" # (optional, must match CIDR used by the given subnet)

      us-east-1b:
        id: "subnet-0c031393364970901"
        #cidr: "192.168.64.0/19"  # (optional, must match CIDR used by the given subnet)
#    public:
#      us-east-2a:
#        id: "subnet-04c8b31be480cad9b"
#        #cidr: "192.168.128.0/19" # (optional, must match CIDR used by the given subnet)
#
#      us-east-2b:
#        id: "subnet-0cbf99d302c0f0a2e"
#        #cidr: "192.168.64.0/19"  # (optional, must match CIDR used by the given subnet)


nodeGroups:
  - name: ngNpeSdp099
    instanceType: m5.xlarge
    minSize: 6
    maxSize: 30
    volumeSize: 500
    volumeType: gp2
    privateNetworking: true
    iam:
      attachPolicyARNs:
        - arn:aws:iam::aws:policy/ElasticLoadBalancingFullAccess
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
        - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
        - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
        - arn:aws:iam::062328325359:policy/kube2iam
        #- arn:aws:iam::062328325359:policy/SDPpolicy
      withAddonPolicies:
        autoScaler: true
        imageBuilder: true
    ssh:
      publicKeyName: npe-eks    