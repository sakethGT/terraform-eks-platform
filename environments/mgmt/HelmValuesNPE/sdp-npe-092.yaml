# An example of ClusterConfig object using an existing VPC:
---
apiVersion: eksctl.io/v1alpha4
kind: ClusterConfig

######
# for testing only harcoded VPC and subnets - until we are done with Infra design work
######


metadata:
  name: NpeSdp092
  region: us-east-1

vpc:
  id: "vpc-0example1234567890"  # (optional, must match VPC ID used for each subnet below)
  #cidr: "192.168.0.0/16"       # (optional, must match CIDR used by the given VPC)
  subnets:
    # must provide 'private' and/or 'public' subnets by availibility zone as shown
    private:
      us-east-1a:
        id: "subnet-0example1234567890"
        #cidr: "192.168.128.0/19" # (optional, must match CIDR used by the given subnet)

      us-east-1b:
        id: "subnet-0example0987654321"
        #cidr: "192.168.64.0/19"  # (optional, must match CIDR used by the given subnet)
#    public:
#      us-east-2a:
#        id: "subnet-0example1111111111"
#        #cidr: "192.168.128.0/19" # (optional, must match CIDR used by the given subnet)
#
#      us-east-2b:
#        id: "subnet-0example2222222222"
#        #cidr: "192.168.64.0/19"  # (optional, must match CIDR used by the given subnet)


nodeGroups:
  - name: ngNpeSdp092
    instanceType: m5.xlarge
    minSize: 8
    maxSize: 10
    privateNetworking: true
    iam:
      attachPolicyARNs:
        - arn:aws:iam::aws:policy/ElasticLoadBalancingFullAccess
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
        - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
        - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
        - arn:aws:iam::123456789012:policy/kube2iam
        #- arn:aws:iam::123456789012:policy/SDPpolicy
      withAddonPolicies:
        autoScaler: true
        imageBuilder: true
