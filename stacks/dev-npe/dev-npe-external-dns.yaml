provider: aws

aws:
  region: us-east-1

rbac:
  create: true
  serviceAccountName: external-dns

# zone id for dev.npe.example-internal.com
zoneIdFilters:
  - ZEXAMPLEZONEID1

podAnnotations:
  iam.amazonaws.com/role: k8s-external-dns-dev-npe

txtOwnerId: external-dns-dev-npe
publishInternalServices: true
logLevel: debug
