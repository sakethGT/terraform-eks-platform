provider: aws

aws:
  region: us-east-1

rbac:
  create: true
  serviceAccountName: external-dns

# zone id for mgmt.npe.example-internal.com
zoneIdFilters:
  - ZEXAMPLEZONEID2

podAnnotations:
  iam.amazonaws.com/role: k8s-external-dns-mgmt-npe

txtOwnerId: external-dns-mgmt-npe
publishInternalServices: true
logLevel: debug
